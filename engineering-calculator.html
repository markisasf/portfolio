<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Инженерный калькулятор</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #14132B;
    --panel: #1C1A3F;
    --key: #201D48;
    --key-op: #2A2660;
    --text: #F2F0FA;
    --text-dim: #9C97C4;
    --accent: #E8B04B;
    --accent-2: #8B7EF0;
    --danger: #E86B4B;
    --border: rgba(242,240,250,0.12);
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    color: var(--text);
    padding: 24px;
  }
  .calc{
    width: 100%;
    max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
  }
  .calc-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 14px;
  }
  .calc-title{
    font-family:'Space Grotesk', sans-serif;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .mode-toggle{
    display:flex;
    gap:4px;
    background: var(--key);
    border-radius: 8px;
    padding: 3px;
  }
  .mode-toggle button{
    border:none;
    background: transparent;
    color: var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor:pointer;
  }
  .mode-toggle button.active{
    background: var(--accent);
    color: #14132B;
    font-weight: 600;
  }
  .display{
    background: #100F24;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 18px;
    margin-bottom: 16px;
    text-align: right;
    min-height: 92px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    gap: 6px;
    overflow: hidden;
  }
  #expr{
    color: var(--text-dim);
    font-size: 14px;
    min-height: 18px;
    word-break: break-all;
  }
  #result{
    color: var(--text);
    font-size: 30px;
    font-weight: 600;
    word-break: break-all;
  }
  #result.error{ color: var(--danger); font-size: 18px; }

  .keys{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  button.key{
    border:none;
    border-radius: 9px;
    background: var(--key);
    color: var(--text);
    font-family:'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 14px 0;
    cursor:pointer;
    transition: background .15s ease, transform .1s ease;
  }
  button.key:hover{ background: #262260; }
  button.key:active{ transform: scale(0.95); }
  button.key.op{ background: var(--key-op); color: var(--accent-2); }
  button.key.fn{ color: var(--accent); font-size: 13px; }
  button.key.eq{ background: var(--accent); color: #14132B; font-weight: 700; }
  button.key.clear{ background: var(--danger); color: #fff; }
  button.key:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  .row-hint{
    margin-top: 14px;
    font-size: 11px;
    color: var(--text-dim);
    text-align:center;
  }

  @media (max-width: 420px){
    .keys{ gap: 6px; }
    button.key{ font-size: 13px; padding: 12px 0; }
  }
</style>
</head>
<body>

<div class="calc">
  <div class="calc-head">
    <div class="calc-title">ENGINEERING CALC</div>
    <div class="mode-toggle">
      <button id="deg-btn" class="active">DEG</button>
      <button id="rad-btn">RAD</button>
    </div>
  </div>

  <div class="display">
    <div id="expr"></div>
    <div id="result">0</div>
  </div>

  <div class="keys">
    <button class="key fn" data-fn="sin">sin</button>
    <button class="key fn" data-fn="cos">cos</button>
    <button class="key fn" data-fn="tan">tan</button>
    <button class="key fn" data-fn="log">log</button>
    <button class="key fn" data-fn="ln">ln</button>

    <button class="key fn" data-val="(">(</button>
    <button class="key fn" data-val=")">)</button>
    <button class="key fn" data-val="^">x^y</button>
    <button class="key fn" data-fn="sqrt">√</button>
    <button class="key clear" id="clear-btn">C</button>

    <button class="key" data-val="7">7</button>
    <button class="key" data-val="8">8</button>
    <button class="key" data-val="9">9</button>
    <button class="key op" data-val="/">÷</button>
    <button class="key fn" data-val="pi">π</button>

    <button class="key" data-val="4">4</button>
    <button class="key" data-val="5">5</button>
    <button class="key" data-val="6">6</button>
    <button class="key op" data-val="*">×</button>
    <button class="key fn" data-val="e">e</button>

    <button class="key" data-val="1">1</button>
    <button class="key" data-val="2">2</button>
    <button class="key" data-val="3">3</button>
    <button class="key op" data-val="-">−</button>
    <button class="key fn" data-val="%">mod</button>

    <button class="key" data-val="0">0</button>
    <button class="key" data-val=".">.</button>
    <button class="key" id="back-btn">⌫</button>
    <button class="key op" data-val="+">+</button>
    <button class="key eq" id="eq-btn">=</button>
  </div>

  <div class="row-hint">Клавиатура работает: цифры, + − × ÷ ( ) Enter</div>
</div>

<script>
  const exprEl = document.getElementById('expr');
  const resultEl = document.getElementById('result');
  let expression = '';
  let isRad = false;

  const fnMap = {
    sin: 'sin', cos: 'cos', tan: 'tan',
    log: 'log10', ln: 'log', sqrt: 'sqrt'
  };

  function render(){
    exprEl.textContent = expression || '';
    evaluate(true);
  }

  function toEvalExpression(raw){
    let e = raw;
    e = e.replace(/\^/g, '^'); // mathjs supports ^
    return e;
  }

  function evaluate(preview){
    if(!expression){ resultEl.textContent = '0'; resultEl.classList.remove('error'); return; }
    try{
      const scope = {};
      let evalExpr = toEvalExpression(expression);
      let node = math.parse(evalExpr);
      let compiled = node.compile();

      // handle deg/rad for trig functions by wrapping
      let value;
      if(!isRad){
        // Replace sin(x) cos(x) tan(x) args with degree conversion using a custom scope function
        const wrapped = evalExpr
          .replace(/sin\(/g, 'sin(pi/180*')
          .replace(/cos\(/g, 'cos(pi/180*')
          .replace(/tan\(/g, 'tan(pi/180*');
        value = math.evaluate(wrapped);
      } else {
        value = math.evaluate(evalExpr);
      }

      if (typeof value === 'number' && isFinite(value)){
        resultEl.textContent = +value.toFixed(10);
        resultEl.classList.remove('error');
      } else {
        resultEl.textContent = String(value);
        resultEl.classList.remove('error');
      }
    } catch(e){
      if(!preview){
        resultEl.textContent = 'Ошибка выражения';
        resultEl.classList.add('error');
      }
    }
  }

  document.querySelectorAll('.key[data-val]').forEach(btn => {
    btn.addEventListener('click', () => {
      expression += btn.getAttribute('data-val');
      render();
    });
  });

  document.querySelectorAll('.key[data-fn]').forEach(btn => {
    btn.addEventListener('click', () => {
      const fn = btn.getAttribute('data-fn');
      expression += fnMap[fn] + '(';
      render();
    });
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    expression = '';
    render();
  });

  document.getElementById('back-btn').addEventListener('click', () => {
    expression = expression.slice(0, -1);
    render();
  });

  document.getElementById('eq-btn').addEventListener('click', () => {
    evaluate(false);
    try{
      let wrapped = expression;
      if(!isRad){
        wrapped = wrapped
          .replace(/sin\(/g, 'sin(pi/180*')
          .replace(/cos\(/g, 'cos(pi/180*')
          .replace(/tan\(/g, 'tan(pi/180*');
      }
      const value = math.evaluate(wrapped);
      expression = String(+value.toFixed(10));
      render();
    }catch(e){}
  });

  document.getElementById('deg-btn').addEventListener('click', () => {
    isRad = false;
    document.getElementById('deg-btn').classList.add('active');
    document.getElementById('rad-btn').classList.remove('active');
    render();
  });
  document.getElementById('rad-btn').addEventListener('click', () => {
    isRad = true;
    document.getElementById('rad-btn').classList.add('active');
    document.getElementById('deg-btn').classList.remove('active');
    render();
  });

  window.addEventListener('keydown', (e) => {
    if(/[0-9.+\-*/^()]/.test(e.key)){
      expression += e.key;
      render();
    } else if(e.key === 'Enter'){
      document.getElementById('eq-btn').click();
    } else if(e.key === 'Backspace'){
      document.getElementById('back-btn').click();
    } else if(e.key === 'Escape'){
      document.getElementById('clear-btn').click();
    }
  });
</script>

</body>
</html>

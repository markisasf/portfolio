<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-ассистент поддержки</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #14132B;
    --panel: #1C1A3F;
    --panel-2: #201D48;
    --bubble-bot: #201D48;
    --bubble-user: #E8B04B;
    --text: #F2F0FA;
    --text-dim: #9C97C4;
    --text-dimmer: #6B658F;
    --accent: #E8B04B;
    --accent-2: #8B7EF0;
    --border: rgba(242,240,250,0.12);
    --ok: #7FD9A8;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter', sans-serif;
    color: var(--text);
    padding: 20px;
  }
  .chat{
    width: 100%;
    max-width: 480px;
    height: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
  }

  .chat-head{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .avatar{
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 16px;
    flex-shrink:0;
  }
  .chat-head-info{ flex:1; }
  .chat-head-info .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }
  .chat-head-info .status{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ok);
    display:flex;
    align-items:center;
    gap: 5px;
  }
  .status-dot{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ok);
  }

  .messages{
    flex:1;
    overflow-y: auto;
    padding: 18px;
    display:flex;
    flex-direction:column;
    gap: 12px;
  }
  .messages::-webkit-scrollbar{ width: 6px; }
  .messages::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 3px; }

  .msg{
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    animation: pop .25s ease;
  }
  @keyframes pop{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform: translateY(0);} }

  .msg.bot{
    align-self: flex-start;
    background: var(--bubble-bot);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg.user{
    align-self: flex-end;
    background: var(--bubble-user);
    color: #14132B;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .typing{
    align-self: flex-start;
    background: var(--bubble-bot);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 13px 16px;
    display:flex;
    gap: 4px;
  }
  .typing span{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink-dot 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay: .2s; }
  .typing span:nth-child(3){ animation-delay: .4s; }
  @keyframes blink-dot{
    0%, 80%, 100%{ opacity: .3; transform: scale(0.8); }
    40%{ opacity: 1; transform: scale(1); }
  }

  .suggestions{
    padding: 0 18px 12px;
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .suggestion-chip{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent-2);
    background: rgba(139,126,240,0.1);
    border: 1px solid rgba(139,126,240,0.3);
    border-radius: 999px;
    padding: 7px 13px;
    cursor:pointer;
    transition: background .2s ease;
    white-space: nowrap;
  }
  .suggestion-chip:hover{ background: rgba(139,126,240,0.2); }

  .input-row{
    display:flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }
  .input-row input{
    flex:1;
    background: #14132B;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family:'Inter', sans-serif;
    font-size: 14px;
  }
  .input-row input:focus{ outline: none; border-color: var(--accent-2); }
  .input-row input::placeholder{ color: var(--text-dimmer); }
  .send-btn{
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 44px;
    color: #14132B;
    font-size: 16px;
    cursor:pointer;
    flex-shrink:0;
    transition: opacity .2s ease;
  }
  .send-btn:hover{ opacity: .85; }
  .send-btn:focus-visible, .input-row input:focus-visible, .suggestion-chip:focus-visible{
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  .kb-note{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dimmer);
    text-align:center;
    padding: 8px 16px 0;
  }

  @media (max-width: 520px){
    .chat{ height: 92vh; }
  }
</style>
</head>
<body>

<div class="chat">
  <div class="chat-head">
    <div class="avatar">🤖</div>
    <div class="chat-head-info">
      <div class="name">Ассистент TechStore</div>
      <div class="status"><span class="status-dot"></span>онлайн · отвечает мгновенно</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions"></div>

  <div class="input-row">
    <input type="text" id="chat-input" placeholder="Спросите о заказе, доставке, возврате..." autocomplete="off">
    <button class="send-btn" id="send-btn" aria-label="Отправить">➤</button>
  </div>
  <div class="kb-note">демо-бот · ответы генерируются локально по базе знаний</div>
</div>

<script>
  // Knowledge base: keyword-based matching to simulate RAG-style support bot
  const knowledgeBase = [
    {
      keywords: ['заказ', 'статус', 'где', 'трек', 'отследить'],
      answer: 'Статус заказа можно посмотреть в разделе «Мои заказы» в личном кабинете — там указан текущий этап и трек-номер. Обычно доставка занимает 2–4 дня по городу и 5–7 дней в другие регионы.'
    },
    {
      keywords: ['возврат', 'вернуть', 'обмен', 'не подошло'],
      answer: 'Вернуть товар можно в течение 14 дней с момента получения, если он не был в использовании и сохранена упаковка. Оформить возврат — в разделе «Мои заказы» → «Вернуть товар».'
    },
    {
      keywords: ['доставка', 'сколько дней', 'когда привезут', 'курьер'],
      answer: 'Доставка курьером — 2–4 дня по крупным городам, самовывоз из пункта выдачи доступен уже на следующий день. Точные сроки зависят от вашего региона и указаны при оформлении заказа.'
    },
    {
      keywords: ['оплата', 'оплатить', 'карта', 'рассрочка'],
      answer: 'Принимаем оплату картой, через СБП и в рассрочку от партнёрских банков. Деньги списываются только после подтверждения сборки заказа на складе.'
    },
    {
      keywords: ['аккаунт', 'пароль', 'войти', 'логин', 'регистрация'],
      answer: 'Если не получается войти — воспользуйтесь кнопкой «Забыли пароль» на странице входа, письмо с восстановлением приходит в течение 2–3 минут. Если письмо не пришло — проверьте папку «Спам».'
    },
    {
      keywords: ['брак', 'сломан', 'не работает', 'дефект'],
      answer: 'Если товар пришёл с браком — не нужно оформлять обычный возврат. Напишите нам с фото дефекта, мы организуем бесплатную замену или полный возврат средств в течение 3 рабочих дней.'
    },
    {
      keywords: ['человек', 'оператор', 'менеджер', 'живой'],
      answer: 'Понимаю, иногда нужен живой человек 🙂 Передаю ваш диалог оператору поддержки — обычно подключение занимает не больше 5 минут в рабочее время (9:00–21:00).'
    },
    {
      keywords: ['привет', 'здравствуйте', 'добрый день'],
      answer: 'Здравствуйте! Я помогу с вопросами о заказах, доставке, возврате и оплате. Что вас интересует?'
    }
  ];

  const fallbackAnswer = 'Не нашёл точного ответа в базе знаний. Уточните вопрос или выберите одну из тем ниже — либо я подключу оператора поддержки.';

  const quickSuggestions = [
    'Где мой заказ?',
    'Как оформить возврат?',
    'Сроки доставки',
    'Позвать оператора'
  ];

  const messagesEl = document.getElementById('messages');
  const suggestionsEl = document.getElementById('suggestions');
  const inputEl = document.getElementById('chat-input');

  function addMessage(text, sender){
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function findAnswer(query){
    const q = query.toLowerCase();
    let best = null;
    let bestScore = 0;
    knowledgeBase.forEach(entry => {
      let score = 0;
      entry.keywords.forEach(kw => {
        if(q.includes(kw)) score++;
      });
      if(score > bestScore){
        bestScore = score;
        best = entry;
      }
    });
    return best ? best.answer : fallbackAnswer;
  }

  function renderSuggestions(){
    suggestionsEl.innerHTML = '';
    quickSuggestions.forEach(text => {
      const chip = document.createElement('div');
      chip.className = 'suggestion-chip';
      chip.textContent = text;
      chip.tabIndex = 0;
      chip.addEventListener('click', () => handleUserMessage(text));
      chip.addEventListener('keydown', (e) => { if(e.key === 'Enter') handleUserMessage(text); });
      suggestionsEl.appendChild(chip);
    });
  }

  function showTyping(){
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping(){
    const el = document.getElementById('typing-indicator');
    if(el) el.remove();
  }

  function handleUserMessage(text){
    if(!text.trim()) return;
    addMessage(text, 'user');
    inputEl.value = '';
    showTyping();
    const delay = 550 + Math.random() * 500;
    setTimeout(() => {
      hideTyping();
      const answer = findAnswer(text);
      addMessage(answer, 'bot');
    }, delay);
  }

  document.getElementById('send-btn').addEventListener('click', () => handleUserMessage(inputEl.value));
  inputEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') handleUserMessage(inputEl.value);
  });

  // Initial greeting
  window.addEventListener('load', () => {
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMessage('Здравствуйте! Я AI-ассистент поддержки TechStore. Помогу с заказами, доставкой, возвратом и оплатой — просто спросите.', 'bot');
        renderSuggestions();
      }, 700);
    }, 300);
  });
</script>

</body>
</html>

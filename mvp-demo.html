<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP: Трекер задач</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #14132B;
    --panel: #1C1A3F;
    --panel-2: #201D48;
    --text: #F2F0FA;
    --text-dim: #9C97C4;
    --text-dimmer: #6B658F;
    --accent: #E8B04B;
    --accent-2: #8B7EF0;
    --border: rgba(242,240,250,0.12);
    --ok: #7FD9A8;
    --danger: #E86B4B;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0; min-height:100vh;
    background: var(--bg);
    display:flex; align-items:center; justify-content:center;
    font-family:'Inter', sans-serif; color: var(--text);
    padding: 24px;
  }
  .app{
    width: 100%; max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
  }
  .app-head{
    padding: 20px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .app-head h1{
    font-family:'Space Grotesk', sans-serif;
    font-size: 18px; margin: 0 0 4px;
  }
  .app-head p{
    margin:0; color: var(--text-dim); font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .progress-bar{
    height: 5px; background: #100F24; border-radius: 999px; overflow:hidden; margin-top: 14px;
  }
  .progress-fill{
    height: 100%; background: linear-gradient(90deg, var(--accent-2), var(--accent));
    width: 0%; transition: width .4s ease;
  }

  .add-row{
    display:flex; gap: 8px; padding: 16px 20px;
  }
  .add-row input{
    flex:1; background:#100F24; border:1px solid var(--border); border-radius: 9px;
    padding: 11px 13px; color: var(--text); font-size: 14px;
  }
  .add-row input:focus{ outline:none; border-color: var(--accent-2); }
  .add-btn{
    background: var(--accent); border:none; border-radius: 9px; width: 42px;
    color:#14132B; font-size: 18px; font-weight:700; cursor:pointer;
  }
  .add-btn:hover{ opacity: .88; }

  .filters{
    display:flex; gap: 6px; padding: 0 20px 14px;
  }
  .filter-btn{
    font-family:'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--text-dim); background: transparent;
    border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 14px; cursor:pointer; transition: all .15s ease;
  }
  .filter-btn.active{ background: var(--text); color: #14132B; border-color: var(--text); }

  .list{
    list-style:none; margin:0; padding: 0 12px 12px;
    max-height: 360px; overflow-y:auto;
  }
  .task{
    display:flex; align-items:center; gap: 10px;
    padding: 12px 10px; border-radius: 10px;
    transition: background .15s ease;
  }
  .task:hover{ background: rgba(242,240,250,0.03); }
  .checkbox{
    width: 20px; height: 20px; border-radius: 6px;
    border: 1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0; font-size: 12px; color: transparent;
    transition: all .15s ease;
  }
  .checkbox.checked{ background: var(--ok); border-color: var(--ok); color: #14132B; }
  .task-text{ flex:1; font-size: 14px; word-break: break-word; }
  .task.done .task-text{ color: var(--text-dimmer); text-decoration: line-through; }
  .del-btn{
    background:none; border:none; color: var(--text-dimmer); cursor:pointer;
    font-size: 16px; padding: 4px; opacity: 0; transition: opacity .15s ease, color .15s ease;
  }
  .task:hover .del-btn{ opacity: 1; }
  .del-btn:hover{ color: var(--danger); }

  .empty{
    text-align:center; color: var(--text-dimmer); font-size: 13px;
    padding: 30px 20px; font-family:'IBM Plex Mono', monospace;
  }

  .footer-note{
    padding: 12px 20px; border-top: 1px solid var(--border);
    font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dimmer);
    text-align:center;
  }

  :focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>

<div class="app">
  <div class="app-head">
    <h1>Трекер задач — MVP за день</h1>
    <p id="progress-label">0 из 0 выполнено</p>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="add-row">
    <input type="text" id="task-input" placeholder="Добавить задачу..." autocomplete="off">
    <button class="add-btn" id="add-btn" aria-label="Добавить">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="active">Активные</button>
    <button class="filter-btn" data-filter="done">Выполненные</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer-note">данные сохраняются в этом браузере (localStorage)</div>
</div>

<script>
  const STORAGE_KEY = 'mvp-tracker-tasks';
  let tasks = [];
  let filter = 'all';

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : defaultTasks();
    }catch(e){
      tasks = defaultTasks();
    }
  }
  function defaultTasks(){
    return [
      { id: 1, text: 'Собрать структуру MVP', done: true },
      { id: 2, text: 'Настроить форму захвата лидов', done: true },
      { id: 3, text: 'Подключить аналитику', done: false },
      { id: 4, text: 'Показать прототип заказчику', done: false }
    ];
  }
  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }catch(e){}
  }

  function render(){
    const list = document.getElementById('list');
    list.innerHTML = '';
    const filtered = tasks.filter(t => {
      if(filter === 'active') return !t.done;
      if(filter === 'done') return t.done;
      return true;
    });

    if(filtered.length === 0){
      list.innerHTML = '<div class="empty">Задач нет — самое время добавить первую</div>';
    } else {
      filtered.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task' + (t.done ? ' done' : '');
        li.innerHTML = `
          <div class="checkbox ${t.done ? 'checked' : ''}" data-id="${t.id}">${t.done ? '✓' : ''}</div>
          <div class="task-text">${escapeHtml(t.text)}</div>
          <button class="del-btn" data-id="${t.id}" aria-label="Удалить">✕</button>
        `;
        list.appendChild(li);
      });
    }

    list.querySelectorAll('.checkbox').forEach(cb => {
      cb.addEventListener('click', () => toggleTask(Number(cb.getAttribute('data-id'))));
    });
    list.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteTask(Number(btn.getAttribute('data-id'))));
    });

    const doneCount = tasks.filter(t => t.done).length;
    document.getElementById('progress-label').textContent = `${doneCount} из ${tasks.length} выполнено`;
    const pct = tasks.length ? (doneCount / tasks.length) * 100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function addTask(text){
    if(!text.trim()) return;
    tasks.push({ id: Date.now(), text: text.trim(), done: false });
    save(); render();
  }
  function toggleTask(id){
    const t = tasks.find(t => t.id === id);
    if(t){ t.done = !t.done; save(); render(); }
  }
  function deleteTask(id){
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    const input = document.getElementById('task-input');
    addTask(input.value);
    input.value = '';
    input.focus();
  });
  document.getElementById('task-input').addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      addTask(e.target.value);
      e.target.value = '';
    }
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.getAttribute('data-filter');
      render();
    });
  });

  load();
  render();
</script>

</body>
</html>

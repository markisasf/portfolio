<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МАРКЕТ.ONE — маркетплейс</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #F5F6F8;
    --surface: #FFFFFF;
    --ink: #14151A;
    --ink-dim: #6B6E76;
    --border: #E7E8EC;
    --accent: #FF6B35;
    --accent-dark: #E2551F;
    --ok: #1FA463;
    --radius: 12px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
  }
  a{ color: inherit; text-decoration: none; }
  button{ font-family: inherit; }
  :focus-visible{ outline: 2px solid var(--accent-dark); outline-offset: 2px; }

  .brand{
    font-family:'Manrope', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  .brand span{ color: var(--accent); }

  /* header */
  header{
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 40;
  }
  .top-bar{
    max-width: 1180px;
    margin: 0 auto;
    padding: 16px 24px;
    display:flex;
    align-items:center;
    gap: 24px;
  }
  .search-box{
    flex:1;
    display:flex;
    align-items:center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 18px;
    gap: 10px;
  }
  .search-box input{
    flex:1;
    border:none;
    background: transparent;
    font-size: 14px;
    color: var(--ink);
  }
  .search-box input:focus{ outline:none; }
  .search-box svg{ flex-shrink:0; color: var(--ink-dim); }

  .header-actions{
    display:flex;
    align-items:center;
    gap: 20px;
  }
  .icon-link{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 2px;
    font-size: 11px;
    color: var(--ink-dim);
    position: relative;
    cursor:pointer;
    background:none;
    border:none;
  }
  .cart-count{
    position:absolute;
    top:-6px; right:-10px;
    background: var(--accent);
    color:#fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    padding: 1px 6px;
    min-width: 16px;
    text-align:center;
  }

  .cat-bar{
    border-top: 1px solid var(--border);
  }
  .cat-inner{
    max-width: 1180px;
    margin: 0 auto;
    padding: 10px 24px;
    display:flex;
    gap: 10px;
    overflow-x: auto;
  }
  .cat-chip{
    white-space: nowrap;
    font-size: 13px;
    color: var(--ink-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 16px;
    cursor:pointer;
    transition: all .15s ease;
  }
  .cat-chip.active, .cat-chip:hover{
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* hero banner */
  .banner{
    max-width: 1180px;
    margin: 24px auto 0;
    padding: 0 24px;
  }
  .banner-inner{
    background: linear-gradient(120deg, #1B1C22, #33343D);
    border-radius: 18px;
    padding: 40px 44px;
    color: #fff;
    display:flex;
    justify-content: space-between;
    align-items:center;
    flex-wrap: wrap;
    gap: 20px;
  }
  .banner-inner h1{
    font-family:'Manrope', sans-serif;
    font-size: clamp(22px, 3vw, 30px);
    margin: 0 0 10px;
  }
  .banner-inner p{
    margin: 0;
    color: rgba(255,255,255,0.7);
    max-width: 44ch;
    font-size: 14px;
  }
  .banner-badge{
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* main */
  main{
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }
  .section-title{
    font-family:'Manrope', sans-serif;
    font-weight: 700;
    font-size: 20px;
    margin: 0 0 18px;
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 16px;
  }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display:flex;
    flex-direction:column;
    gap: 10px;
    transition: box-shadow .2s ease, transform .2s ease;
    position: relative;
  }
  .card:hover{
    box-shadow: 0 16px 32px -18px rgba(20,21,26,0.25);
    transform: translateY(-2px);
  }
  .card-img{
    height: 140px;
    border-radius: 8px;
    background: var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 44px;
  }
  .discount-badge{
    position:absolute;
    top: 22px; left: 22px;
    background: var(--ok);
    color:#fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .card-name{
    font-size: 13.5px;
    line-height: 1.4;
    min-height: 38px;
  }
  .card-rating{
    font-size: 12px;
    color: var(--ink-dim);
    display:flex;
    align-items:center;
    gap: 4px;
  }
  .card-rating .stars{ color: #F5A623; }
  .price-row{
    display:flex;
    align-items:baseline;
    gap: 8px;
  }
  .price-now{
    font-family:'Manrope', sans-serif;
    font-weight: 800;
    font-size: 17px;
  }
  .price-old{
    font-size: 12px;
    color: var(--ink-dim);
    text-decoration: line-through;
  }
  .add-btn{
    margin-top: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 0;
    font-size: 13px;
    font-weight: 600;
    cursor:pointer;
    transition: background .15s ease, color .15s ease;
  }
  .add-btn:hover{ background: var(--ink); color: #fff; border-color: var(--ink); }
  .add-btn.added{ background: var(--ok); color:#fff; border-color: var(--ok); }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-dim);
  }

  footer{
    border-top: 1px solid var(--border);
    padding: 30px 24px;
    text-align:center;
    color: var(--ink-dim);
    font-size: 12px;
  }

  @media (max-width: 640px){
    .top-bar{ flex-wrap: wrap; }
    .banner-inner{ padding: 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="top-bar">
    <span class="brand">МАРКЕТ<span>.ONE</span></span>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Найти товары, бренды...">
    </div>
    <div class="header-actions">
      <button class="icon-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Профиль
      </button>
      <button class="icon-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2l1.5 12.5A2 2 0 0 0 9.5 16h6a2 2 0 0 0 2-1.7L19 6H6.6"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
        Корзина
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </div>
  <div class="cat-bar">
    <div class="cat-inner" id="cat-bar">
      <div class="cat-chip active" data-cat="all">Все</div>
      <div class="cat-chip" data-cat="electronics">Электроника</div>
      <div class="cat-chip" data-cat="home">Дом</div>
      <div class="cat-chip" data-cat="fashion">Одежда</div>
      <div class="cat-chip" data-cat="beauty">Красота</div>
      <div class="cat-chip" data-cat="sport">Спорт</div>
      <div class="cat-chip" data-cat="kids">Детям</div>
    </div>
  </div>
</header>

<div class="banner">
  <div class="banner-inner">
    <div>
      <h1>Распродажа середины лета</h1>
      <p>Скидки до 40% на электронику и товары для дома — только до конца недели.</p>
    </div>
    <div class="banner-badge">−40%</div>
  </div>
</div>

<main>
  <h2 class="section-title" id="results-title">Все товары</h2>
  <div class="grid" id="product-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none;">Ничего не найдено — попробуйте другой запрос или категорию.</div>
</main>

<footer>Демо-макет для портфолио · не является действующим магазином</footer>

<script>
  const products = [
    { id: 1, name: 'Беспроводные наушники с шумоподавлением', cat: 'electronics', icon: '🎧', price: 4990, old: 7990, rating: 4.7, reviews: 812 },
    { id: 2, name: 'Умные часы с трекером сна', cat: 'electronics', icon: '⌚', price: 8990, old: null, rating: 4.5, reviews: 340 },
    { id: 3, name: 'Механическая клавиатура RGB', cat: 'electronics', icon: '⌨️', price: 5490, old: 6990, rating: 4.8, reviews: 210 },
    { id: 4, name: 'Портативная колонка водостойкая', cat: 'electronics', icon: '🔊', price: 3290, old: null, rating: 4.4, reviews: 156 },
    { id: 5, name: 'Хлопковое постельное белье, комплект', cat: 'home', icon: '🛏️', price: 2790, old: 3590, rating: 4.6, reviews: 98 },
    { id: 6, name: 'Керамический набор посуды, 12 предметов', cat: 'home', icon: '🍽️', price: 3990, old: null, rating: 4.3, reviews: 74 },
    { id: 7, name: 'Ароматическая свеча соевая', cat: 'home', icon: '🕯️', price: 690, old: 990, rating: 4.9, reviews: 421 },
    { id: 8, name: 'Плед из микрофибры 150x200', cat: 'home', icon: '🧣', price: 1490, old: null, rating: 4.5, reviews: 133 },
    { id: 9, name: 'Куртка ветровка унисекс', cat: 'fashion', icon: '🧥', price: 3490, old: 4990, rating: 4.4, reviews: 89 },
    { id: 10, name: 'Кроссовки для бега лёгкие', cat: 'fashion', icon: '👟', price: 4290, old: null, rating: 4.6, reviews: 267 },
    { id: 11, name: 'Рюкзак городской 20л', cat: 'fashion', icon: '🎒', price: 2190, old: 2790, rating: 4.5, reviews: 178 },
    { id: 12, name: 'Сыворотка с витамином C', cat: 'beauty', icon: '🧴', price: 990, old: 1390, rating: 4.7, reviews: 512 },
    { id: 13, name: 'Фен для волос ионизация', cat: 'beauty', icon: '💇', price: 2990, old: null, rating: 4.3, reviews: 145 },
    { id: 14, name: 'Набор кистей для макияжа', cat: 'beauty', icon: '💄', price: 1290, old: 1690, rating: 4.6, reviews: 203 },
    { id: 15, name: 'Коврик для йоги нескользящий', cat: 'sport', icon: '🧘', price: 1590, old: null, rating: 4.8, reviews: 310 },
    { id: 16, name: 'Гантели неопреновые, пара', cat: 'sport', icon: '🏋️', price: 1990, old: 2490, rating: 4.5, reviews: 92 },
    { id: 17, name: 'Велосипедный шлем регулируемый', cat: 'sport', icon: '🚴', price: 2490, old: null, rating: 4.4, reviews: 61 },
    { id: 18, name: 'Конструктор для детей 500 деталей', cat: 'kids', icon: '🧩', price: 1890, old: 2390, rating: 4.9, reviews: 388 },
    { id: 19, name: 'Мягкая игрушка плюшевая', cat: 'kids', icon: '🧸', price: 890, old: null, rating: 4.7, reviews: 244 },
    { id: 20, name: 'Настольная игра для всей семьи', cat: 'kids', icon: '🎲', price: 1590, old: 1990, rating: 4.6, reviews: 167 }
  ];

  let activeCat = 'all';
  let query = '';
  let cartCount = 0;

  const grid = document.getElementById('product-grid');
  const emptyState = document.getElementById('empty-state');
  const resultsTitle = document.getElementById('results-title');
  const catNames = { all: 'Все товары', electronics: 'Электроника', home: 'Дом', fashion: 'Одежда', beauty: 'Красота', sport: 'Спорт', kids: 'Детям' };

  function formatPrice(p){
    return p.toLocaleString('ru-RU') + ' ₽';
  }

  function renderStars(rating){
    const full = Math.round(rating);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function render(){
    const filtered = products.filter(p => {
      const matchCat = activeCat === 'all' || p.cat === activeCat;
      const matchQuery = p.name.toLowerCase().includes(query.toLowerCase());
      return matchCat && matchQuery;
    });

    resultsTitle.textContent = query ? `Результаты по запросу «${query}»` : catNames[activeCat];

    grid.innerHTML = '';
    if(filtered.length === 0){
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      const discount = p.old ? Math.round((1 - p.price / p.old) * 100) : null;
      card.innerHTML = `
        ${discount ? `<div class="discount-badge">−${discount}%</div>` : ''}
        <div class="card-img">${p.icon}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-rating"><span class="stars">${renderStars(p.rating)}</span> ${p.rating} · ${p.reviews}</div>
        <div class="price-row">
          <span class="price-now">${formatPrice(p.price)}</span>
          ${p.old ? `<span class="price-old">${formatPrice(p.old)}</span>` : ''}
        </div>
        <button class="add-btn" data-id="${p.id}">В корзину</button>
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        cartCount++;
        document.getElementById('cart-count').textContent = cartCount;
        btn.textContent = 'Добавлено ✓';
        btn.classList.add('added');
        setTimeout(() => {
          btn.textContent = 'В корзину';
          btn.classList.remove('added');
        }, 1200);
      });
    });
  }

  document.querySelectorAll('.cat-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCat = chip.getAttribute('data-cat');
      render();
    });
  });

  document.getElementById('search-input').addEventListener('input', (e) => {
    query = e.target.value;
    render();
  });

  render();
</script>

</body>
</html>

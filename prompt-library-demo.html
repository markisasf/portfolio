<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека промтов</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #14132B;
    --panel: #1C1A3F;
    --panel-2: #201D48;
    --text: #F2F0FA;
    --text-dim: #9C97C4;
    --text-dimmer: #6B658F;
    --accent: #E8B04B;
    --accent-2: #8B7EF0;
    --border: rgba(242,240,250,0.12);
    --ok: #7FD9A8;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0; min-height:100vh;
    background: var(--bg); color: var(--text);
    font-family:'Inter', sans-serif;
    padding: 28px 20px;
  }
  .wrap{ max-width: 760px; margin: 0 auto; }

  header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size: 22px; margin: 0 0 6px;
  }
  header p{ color: var(--text-dim); margin: 0 0 20px; font-size: 14px; }

  .controls{
    display:flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .search-box{
    flex: 1; min-width: 200px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; display:flex; align-items:center; gap: 8px;
  }
  .search-box input{
    flex:1; background: transparent; border:none; color: var(--text); font-size: 14px;
  }
  .search-box input:focus{ outline:none; }
  .search-box svg{ color: var(--text-dimmer); flex-shrink:0; }

  .cat-filters{ display:flex; gap: 6px; flex-wrap: wrap; }
  .cat-chip{
    font-family:'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--text-dim); background: var(--panel);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 8px 14px; cursor:pointer; transition: all .15s ease; white-space: nowrap;
  }
  .cat-chip.active{ background: var(--accent); color:#14132B; border-color: var(--accent); font-weight:600; }

  .prompt-grid{ display:flex; flex-direction:column; gap: 12px; }
  .prompt-card{
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px;
  }
  .prompt-head{
    display:flex; justify-content:space-between; align-items:flex-start; gap: 12px; margin-bottom: 8px;
  }
  .real-badge{
    font-family:'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--ok);
    margin-top: 4px;
  }
  .card-actions{
    display:flex; align-items:center; gap: 14px; flex-wrap: wrap;
  }
  .source-link{
    font-family:'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent-2);
    text-decoration: none;
  }
  .source-link:hover{ text-decoration: underline; }
  .prompt-title{ font-size: 15px; font-weight: 600; }
  .prompt-cat{
    font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent-2);
    background: rgba(139,126,240,0.1); border-radius: 5px; padding: 3px 8px; white-space: nowrap;
  }
  .prompt-text{
    font-family:'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--text-dim);
    background: #100F24; border-radius: 8px; padding: 12px 14px; line-height: 1.6;
    white-space: pre-wrap; margin: 10px 0 12px;
  }
  .copy-btn{
    font-family:'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 16px; cursor:pointer; transition: all .15s ease;
  }
  .copy-btn:hover{ border-color: var(--accent-2); color: var(--accent-2); }
  .copy-btn.copied{ background: var(--ok); color: #14132B; border-color: var(--ok); }

  .empty{
    text-align:center; color: var(--text-dimmer); padding: 40px 20px;
    font-family:'IBM Plex Mono', monospace; font-size: 13px;
  }

  :focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (max-width: 480px){
    .prompt-head{ flex-direction: column; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Библиотека промтов</h1>
    <p>Проверенные шаблоны — вместо того, чтобы придумывать запрос заново каждый раз.</p>
  </header>

  <div class="controls">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Поиск по промтам...">
    </div>
  </div>
  <div class="cat-filters" id="cat-filters"></div>

  <div class="prompt-grid" id="prompt-grid" style="margin-top: 16px;"></div>
</div>

<script>
  const prompts = [
    {
      id: 1, cat: 'Копирайтинг',
      title: 'Продающий текст для лендинга',
      text: 'Напиши продающий текст для лендинга продукта [название]. Целевая аудитория: [описание]. Тон: уверенный, без воды. Структура: заголовок, 3 боли клиента, 3 выгоды продукта, призыв к действию. Объём: до 200 слов.'
    },
    {
      id: 2, cat: 'Код',
      title: 'Ревью кода перед мерджем',
      text: 'Проверь этот код на: 1) потенциальные баги, 2) проблемы производительности, 3) читаемость и именование, 4) соответствие best practices языка. Дай конкретные предложения с примерами, без общих фраз.'
    },
    {
      id: 3, cat: 'Анализ данных',
      title: 'Саммари по таблице метрик',
      text: 'Проанализируй приложенную таблицу с метриками за период. Выдели: 1) три главных тренда, 2) аномалии или выбросы, 3) один вывод, требующий действия. Формат — короткие пункты, без воды.'
    },
    {
      id: 4, cat: 'Поддержка клиентов',
      title: 'Ответ на негативный отзыв',
      text: 'Клиент оставил негативный отзыв: [вставить текст]. Напиши ответ от лица компании: признай проблему без оправданий, предложи конкретное решение, сохрани уважительный и человечный тон, без шаблонных фраз.'
    },
    {
      id: 5, cat: 'Код',
      title: 'Объяснение legacy-кода',
      text: 'Объясни, что делает этот код, шаг за шагом, как будто для разработчика, который видит его впервые. Отдельно укажи неочевидные места и потенциальные ловушки при изменении.'
    },
    {
      id: 6, cat: 'Копирайтинг',
      title: 'Серия писем для рассылки',
      text: 'Составь серию из 3 писем для email-рассылки на тему [тема]. Письмо 1 — польза без продажи, письмо 2 — кейс/пример, письмо 3 — предложение с дедлайном. Каждое письмо — до 150 слов, разговорный тон.'
    },
    {
      id: 7, cat: 'Анализ данных',
      title: 'Формулировка гипотезы A/B-теста',
      text: 'На основе данных [описание метрики и проблемы] сформулируй гипотезу для A/B-теста по схеме: «Если сделать [изменение], то [метрика] изменится на [ожидание], потому что [причина]». Предложи метрику успеха.'
    },
    {
      id: 8, cat: 'Поддержка клиентов',
      title: 'FAQ-ответ из документации',
      text: 'На основе приложенной документации сформулируй короткий ответ на вопрос клиента: [вопрос]. Ответ должен быть точным, без лишних деталей, с указанием, куда обратиться, если это не решает проблему.'
    },
    {
      id: 9, cat: 'Соцсети / Web3',
      title: 'Твит-тред по брифу проекта',
      real: true,
      sources: [
        'https://x.com/bFv48wHjSCKhBze/status/2061817762813493530',
        'https://x.com/bFv48wHjSCKhBze/status/2052011126804660701'
      ],
      text: `Напиши мне текст для твиттера на тему [бриф проекта, включая структуру по пунктам, ключевую мысль каждого раздела, обязательные ссылки/упоминания и список ключевых слов, которые нужно использовать естественно]. Текст не должен превышать максимальное количество символов для твиттера.`
    },
    {
      id: 10, cat: 'Соцсети / Web3',
      title: 'Разбивка текста на тред',
      real: true,
      sources: [
        'https://x.com/bFv48wHjSCKhBze/status/2061817762813493530',
        'https://x.com/bFv48wHjSCKhBze/status/2052011126804660701'
      ],
      text: 'Подели текст на [количество] твитов/тредов.'
    },
    {
      id: 11, cat: 'Генерация изображений',
      title: 'Картинка + текст под конкретную тему',
      real: true,
      sources: [
        'https://x.com/bFv48wHjSCKhBze/status/2061817762813493530',
        'https://x.com/bFv48wHjSCKhBze/status/2052011126804660701',
        'https://x.com/bFv48wHjSCKhBze/status/2054196399080644914',
        'https://x.com/bFv48wHjSCKhBze/status/2050547352482496709',
        'https://x.com/bFv48wHjSCKhBze/status/2041466826727600381',
        'https://x.com/bFv48wHjSCKhBze/status/2045129670094426117'
      ],
      text: 'Создай картинку, подходящую по смыслу к тексту на тему [тема, например: лошадиные скачки, гонки на авто], и обязательно напиши текст о проекте.'
    }
  ];

  let activeCat = 'all';
  let query = '';

  const categories = ['all', ...new Set(prompts.map(p => p.cat))];
  const catFiltersEl = document.getElementById('cat-filters');
  const gridEl = document.getElementById('prompt-grid');

  function renderFilters(){
    catFiltersEl.innerHTML = '';
    categories.forEach(cat => {
      const chip = document.createElement('div');
      chip.className = 'cat-chip' + (cat === activeCat ? ' active' : '');
      chip.textContent = cat === 'all' ? 'Все' : cat;
      chip.addEventListener('click', () => {
        activeCat = cat;
        renderFilters();
        renderGrid();
      });
      catFiltersEl.appendChild(chip);
    });
  }

  function renderGrid(){
    const filtered = prompts.filter(p => {
      const matchCat = activeCat === 'all' || p.cat === activeCat;
      const matchQuery = p.title.toLowerCase().includes(query.toLowerCase()) || p.text.toLowerCase().includes(query.toLowerCase());
      return matchCat && matchQuery;
    });

    gridEl.innerHTML = '';
    if(filtered.length === 0){
      gridEl.innerHTML = '<div class="empty">Ничего не найдено — попробуйте другой запрос</div>';
      return;
    }

    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = 'prompt-card';
      card.innerHTML = `
        <div class="prompt-head">
          <div>
            <div class="prompt-title">${p.title}</div>
            ${p.real ? '<div class="real-badge">✓ реальный кейс</div>' : ''}
          </div>
          <div class="prompt-cat">${p.cat}</div>
        </div>
        <div class="prompt-text">${p.text}</div>
        <div class="card-actions">
          <button class="copy-btn" data-id="${p.id}">Скопировать промт</button>
          ${(p.sources || []).map((src, i) => `<a class="source-link" href="${src}" target="_blank" rel="noopener">Пример ${i+1} →</a>`).join('')}
        </div>
      `;
      gridEl.appendChild(card);
    });

    gridEl.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const p = prompts.find(p => p.id === Number(btn.getAttribute('data-id')));
        try{
          await navigator.clipboard.writeText(p.text);
        }catch(e){
          // fallback for restricted clipboard access
          const ta = document.createElement('textarea');
          ta.value = p.text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        btn.textContent = 'Скопировано ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Скопировать промт';
          btn.classList.remove('copied');
        }, 1500);
      });
    });
  }

  document.getElementById('search-input').addEventListener('input', (e) => {
    query = e.target.value;
    renderGrid();
  });

  renderFilters();
  renderGrid();
</script>

</body>
</html>
